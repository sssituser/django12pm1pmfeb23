<!DOCTYPE>
{% extends 'myapp/base.html' %}
{% block contentblock %}
    <div class="container mt-5">
        
        <div class="row d-flex justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header text-center bg-primary text-white">
                        <p class="h1">{{stu.StuName}} Info</p>
                    </div>
                    <div class="card-body text-left">
                        <p class="h2">Student ID : {{student.StuId}}</p>
                        <p class="h2">Student Name : {{student.StuName}}</p>
                         <p class="h2">Student  Marks: {{student.StuMarks}}</p>
                    </div>
                    <div class="card-footer">
                        <a href="/" class="btn btn-sm btn-warning">Back</a>
                         <a href="/edit/{{student.id}}/" class="btn btn-sm btn-danger float-end">Edit</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
{%endblock%}
