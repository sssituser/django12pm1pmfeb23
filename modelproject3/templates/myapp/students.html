<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students</title>
     <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
/>

<!-- Google Roboto font (optional, recommended for Material Design look) -->
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap"
/>

<!-- MDBootstrap CSS -->
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/mdb-ui-kit@latest/css/mdb.min.css"
/>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body>
        <p class="h1 text-center">Students Page</p>
        <div class="container text-center mt-5"> 
            {%if studs%}
              <table class="table table-bordered table-hover table-striped text-center animate__animated animate__flip">
                  <thead >
                      <tr>
                        <th class="bg-primary text-white">Student ID</th>
                        <th class="bg-primary text-white">Student Name</th>
                        <th class="bg-primary text-white">Student Marks</th>
                      </tr>
                  </thead>
                  <tbody>
                    {%for stu in studs%}
                      <tr>
                        <td>{{stu.StuId}}</td>
                        <td>{{stu.StuName}}</td>
                        <td>{{stu.StuMarks}}</td>
                      </tr>
                    {%endfor%}
                  </tbody>
              </table>
             {%else%}
              <p class="h1 text-danger">Records Not Found</p>
             {%endif%}
        </div>

</body>
</html>
