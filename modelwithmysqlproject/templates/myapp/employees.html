<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees</title>
     <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
/>

<!-- Google Roboto font (optional, recommended for Material Design look) -->
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap"
/>

<!-- MDBootstrap CSS -->
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/mdb-ui-kit@latest/css/mdb.min.css"
/>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-10">
                {% if emps %}

                    <p class="h1 text-center text-success">Records Found</p>

                    <table class="table table-bordered table-striped table-hover text-center">
                        <thead>
                           <tr>
                                <th class="bg-primary text-white font-weight-bold">Employee ID</th>
                                <th class="bg-primary text-white font-weight-bold">Employee Name</th>
                                <th class="bg-primary text-white font-weight-bold">Employee Salary</th>
                           </tr>
                        </thead>
                        <tbody>
                            {% for emp in emps %}
                                <tr>
                                    <td>{{emp.EmpId}}</td>
                                    <td>{{emp.EmpName}}</td>
                                    <td>{{emp.EmpSal}}</td>
                                </tr>
                            {% endfor %}
                        </tbody>
                    </table>

                {%else%}

                    <p class="h1 text-center text-danger">Records Not Found</p>
                {%endif%}
            </div>
        </div>
    </div>
</body>
</html>
